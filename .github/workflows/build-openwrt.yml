name: Build RAX30000QY

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  # 强制 actions 使用 Node.js 24（解决 Node.js 20 弃用警告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/tiegenb/openwrt-rax3000QY
  REPO_BRANCH: ipq50xx-qsdk-kernel-5.4-openwrt-21.02-qsdk-11.5.05.841.1029
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt update
        sudo apt install build-essential clang flex g++ gawk gcc-multilib gettext \
        git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # 初始空间检查
        echo "=== Initial disk space ==="
        df -h
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |        
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        
    # ========== 新增：下载必要的 backports 包（解决 mac80211 编译失败） ==========
    - name: Fix some download failed first
      run: |
        cd openwrt
        mkdir -p dl
        
        echo "📥 下载必要的 QSDK backports 包..."
        
        # 下载 backports 包（用于无线驱动）
        if [ ! -f dl/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz ]; then
          echo "下载 backports-20210222-5.4-qsdk-11.5.0.5.tar.xz..."
          wget -q --show-progress \
            "https://www.dropbox.com/scl/fi/9ts30p2csnlb9imaf8k68/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz?rlkey=sntbyfjgg86gu2uoocgb9ggp1&st=7w81hl56&dl=1" \
            -O dl/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz || {
              echo "⚠️ 警告: backports 包下载失败，尝试备用方法..."
              # 备用：尝试其他源或跳过
            }
        else
          echo "✅ backports 包已存在，跳过下载"
        fi
        
        # 下载内核补丁包
        if [ ! -f dl/linux-5.4-qsdk-11.5.0.5.tar.xz ]; then
          echo "下载 linux-5.4-qsdk-11.5.0.5.tar.xz..."
          wget -q --show-progress \
            "https://www.dropbox.com/scl/fi/gu7ge6jmefn72ttuop1zs/linux-5.4-qsdk-11.5.0.5.tar.xz?rlkey=tdpq0ye35x290frbh7i8uqrm8&st=jjvegqrr&dl=1" \
            -O dl/linux-5.4-qsdk-11.5.0.5.tar.xz || {
              echo "⚠️ 警告: 内核补丁包下载失败，尝试备用方法..."
            }
        else
          echo "✅ 内核补丁包已存在，跳过下载"
        fi
        
        # 验证下载的文件
        echo ""
        echo "📋 dl 目录中的 QSDK 相关文件："
        ls -lh dl/*qsdk* 2>/dev/null || echo "  (未找到 QSDK 文件)"
        
    # ========== 新增：修复 mac80211 编译问题的额外步骤 ==========
    - name: Fix mac80211 compilation issues
      run: |
        cd openwrt
        
        echo "🔧 修复 mac80211 编译问题..."
        
        # 设置编译标志，禁用可能引起问题的调试选项
        echo "CONFIG_KERNEL_DEBUG_INFO=n" >> .config
        echo "CONFIG_PACKAGE_MAC80211_DEBUGFS=n" >> .config
        echo "CONFIG_PACKAGE_MAC80211_MESH=n" >> .config
        echo "CONFIG_PACKAGE_MAC80211_TRACERS=n" >> .config
        
        # 确保内核头文件正确链接
        if [ -d build_dir/target-*/linux-*/linux-5.4* ]; then
          KERNEL_DIR=$(find build_dir/target-* -name "linux-5.4*" -type d 2>/dev/null | head -1)
          if [ -n "$KERNEL_DIR" ]; then
            echo "找到内核目录: $KERNEL_DIR"
            ln -sf $KERNEL_DIR build_dir/target-*/linux-*/linux 2>/dev/null || true
          fi
        fi
        
        echo "✅ mac80211 修复完成"
        
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Add custom packages and modify LAN IP
      run: |
        cd openwrt
        
        # 添加软件包配置
        cat >> .config << EOF
      
        
        # 无线安全工具
        CONFIG_PACKAGE_aircrack-ng=y
        CONFIG_PACKAGE_airmon-ng=y
        CONFIG_PACKAGE_hcxdumptool=y
        CONFIG_PACKAGE_hcxtools=y
        
        # Material 主题
        CONFIG_PACKAGE_luci-theme-material=y
        CONFIG_PACKAGE_luci-i18n-material-zh-cn=y
        
        EOF
        
        # 创建 uci-defaults 脚本（最可靠的方法）
        echo "Creating uci-defaults script to set LAN IP"
        mkdir -p package/base-files/files/etc/uci-defaults
        cat > package/base-files/files/etc/uci-defaults/99_set_lan_ip << 'EOF'
        #!/bin/sh
        # 设置 LAN IP 为 192.168.66.1
        uci set network.lan.ipaddr='192.168.66.1'
        uci commit network
        # 同时修改 DHCP 网关选项
        uci set dhcp.lan.dhcp_option='3,192.168.66.1'
        uci commit dhcp
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99_set_lan_ip
        
        # 也修改 config_generate（如果存在）
        if [ -f "package/base-files/files/bin/config_generate" ]; then
          sed -i 's/192.168.1.1/192.168.66.1/g' package/base-files/files/bin/config_generate
        fi
        
        echo "✅ LAN IP set to 192.168.66.1"
        
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    # ========== 修改：编译时优先使用 verbose 模式以便调试 ==========
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        
        # 先尝试单线程编译 mac80211 确保依赖正确
        echo "🔧 预编译 mac80211 模块..."
        make package/kernel/mac80211/compile V=s || {
          echo "⚠️ mac80211 单独编译有警告，继续全编译..."
        }
        
        # 编译并捕获错误
        set +e
        echo "🚀 开始全量编译..."
        make -j$(nproc) 2>&1 | tee compile.log
        EXIT_CODE=$?
        set -e
        
        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ First compile attempt failed, trying single thread with verbose..."
          make -j1 V=s 2>&1 | tee compile_verbose.log
          EXIT_CODE=$?
        fi
        
        if [ $EXIT_CODE -ne 0 ]; then
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: Upload compile logs (if failed)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: compile-logs-${{ env.FILE_DATE }}
        path: |
          openwrt/compile.log
          openwrt/compile_verbose.log
        retention-days: 7

    # ========== 关键修改部分：智能固件收集 ==========
    - name: 收集所有固件文件
      run: |
        cd openwrt
        echo "🔍 正在搜索所有编译生成的固件文件..."
        
        # 创建统一的固件收集目录
        mkdir -p $GITHUB_WORKSPACE/firmware-collection
        
        # 显示目录结构用于调试
        echo "📁 bin/targets/ 目录结构："
        find bin/targets/ -type d 2>/dev/null | head -20 || echo "bin/targets/ 不存在"
        
        # 查找并复制所有可能的固件文件
        echo "📦 查找固件文件..."
        find bin/targets/ -type f \( \
          -name "*.bin" -o \
          -name "*.img" -o \
          -name "*.ubi" -o \
          -name "*.tar" -o \
          -name "*.gz" -o \
          -name "*.xz" -o \
          -name "*squashfs*" -o \
          -name "*sysupgrade*" -o \
          -name "*factory*" \
        \) -exec cp -v {} $GITHUB_WORKSPACE/firmware-collection/ \; 2>/dev/null || echo "未找到固件文件"
        
        # 同时复制 profiles.json（包含固件信息）
        find bin/targets/ -name "profiles.json" -exec cp -v {} $GITHUB_WORKSPACE/firmware-collection/ \; 2>/dev/null || true
        
        # 列出找到的所有文件
        echo ""
        echo "✅ 已收集以下文件："
        ls -la $GITHUB_WORKSPACE/firmware-collection/ || echo "目录为空"
        
        # 统计文件数量
        count=$(ls -1 $GITHUB_WORKSPACE/firmware-collection/ 2>/dev/null | wc -l)
        echo ""
        echo "📊 共找到 $count 个文件"
        
        # 如果没找到任何文件，输出详细调试信息
        if [ $count -eq 0 ]; then
          echo ""
          echo "⚠️ 警告：没有找到任何固件文件！"
          echo ""
          echo "📁 完整的 bin/targets/ 目录结构："
          find bin/targets/ -type f 2>/dev/null | head -50 || echo "  (无文件)"
          echo ""
          echo "📁 完整的 bin/ 目录结构："
          find bin/ -type f 2>/dev/null | head -50 || echo "  (无文件)"
          echo ""
          echo "📁 编译状态检查："
          if [ -f ".config" ]; then
            echo "  .config 存在"
            grep "CONFIG_TARGET" .config | grep "=y" | head -5
          else
            echo "  .config 不存在"
          fi
        fi
        
    - name: 上传固件（统一收集版）
      if: success() || failure()  # 即使编译有警告也尝试上传
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-RAX3000QY-${{ env.FILE_DATE }}
        path: firmware-collection/
        retention-days: 7
        if-no-files-found: warn
        
    - name: 上传编译日志和配置（调试用）
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-info-${{ env.FILE_DATE }}
        path: |
          openwrt/.config
          openwrt/feeds.conf.default
          openwrt/compile.log
          openwrt/compile_verbose.log
          openwrt/bin/targets/*/profiles.json
        retention-days: 7
        if-no-files-found: warn
        
    - name: Final cleanup
      if: always()
      run: |
        echo "=== Final cleanup ==="
        sudo rm -rf /workdir
        sudo apt clean
        df -h
